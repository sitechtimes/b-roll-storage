info:
  name: Fetch Media by Filter
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/medias/filter?type=image&title=Deniz&tags"
  params:
    - name: type
      value: image
      type: query
    - name: title
      value: Deniz
      type: query
    - name: tags
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
